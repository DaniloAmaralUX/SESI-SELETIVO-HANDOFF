name: Continuous Integration

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

# O app (Vite/React) vive em app/; todos os passos `run` operam lá.
defaults:
  run:
    working-directory: app

jobs:
  install-lint-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint the code
        run: pnpm lint

      # Reativado após a limpeza de código morto (base zerada no knip)
      - name: Analyze unused files and dependencies
        run: pnpm knip

      - name: Run Prettier check
        run: pnpm format:check

      - name: Install browsers
        run: pnpm test:browser:install

      - name: Run tests
        run: pnpm test

      - name: Build the project
        run: pnpm build
