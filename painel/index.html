<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Painel de Controle — SESI Processo Seletivo</title>
<!-- Fontes usadas SÓ nos specimens do módulo Craft; offline caem no fallback (R10/AE3) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700&family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8; --card: #ffffff; --border: #e3e5e9;
    --ink: #17191d; --muted: #626976; --soft: #eef0f3;
    --hero-bg: #17191d; --hero-ink: #f5f6f8;
    --r: 10px; --r-sm: 6px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #101318; --card: #171b22; --border: #2a2f38;
      --ink: #e8eaed; --muted: #9aa3ad; --soft: #1f242d;
      --hero-bg: #e8eaed; --hero-ink: #101318;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  html { color-scheme: light dark; }
  body {
    font: 15px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--ink);
    padding: clamp(16px, 3vw, 36px);
  }
  .wrap { max-width: 1180px; margin: 0 auto; }

  /* ---------- header ---------- */
  header { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; margin-bottom: 18px; }
  header h1 { font-size: 21px; letter-spacing: -0.01em; }
  header .sub { color: var(--muted); font-size: 14px; flex: 1; }
  .carimbo {
    font-variant-numeric: tabular-nums; font-size: 13px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 99px; padding: 4px 12px; background: var(--card);
    white-space: nowrap;
  }

  /* ---------- retomada ---------- */
  .retomada { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 12px; margin-bottom: 12px; }
  .cartao {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 14px 16px; min-width: 0;
  }
  .cartao h2, .modulo h2 {
    font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--muted); margin-bottom: 8px;
  }
  .retomada p { font-size: 14px; }
  .retomada ul { padding-left: 18px; font-size: 14px; }
  .retomada li + li { margin-top: 3px; }
  .hero { background: var(--hero-bg); color: var(--hero-ink); border-color: transparent; }
  .hero h2 { color: color-mix(in oklab, var(--hero-ink) 65%, transparent); }
  .hero p { font-size: 15.5px; font-weight: 600; line-height: 1.45; }

  /* ---------- grade de módulos ---------- */
  .grade { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .modulo {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
    padding: 16px; min-width: 0;
  }
  .m-road { grid-column: span 4; }
  .m-dec  { grid-column: span 2; grid-row: span 2; }
  .m-arte { grid-column: span 2; }
  .m-ativ { grid-column: span 2; }
  .m-craft{ grid-column: span 6; }
  @media (max-width: 920px) {
    .retomada { grid-template-columns: 1fr; }
    .grade { grid-template-columns: 1fr; }
    .m-road, .m-dec, .m-arte, .m-ativ, .m-craft { grid-column: auto; grid-row: auto; }
  }

  /* ---------- primitivas ---------- */
  .ponto { display: inline-block; width: 10px; height: 10px; border-radius: 50%; border: 1.6px solid var(--ink); vertical-align: -1px; flex: none; }
  .ponto.cheio { background: var(--ink); }
  .ponto.meio  { background: linear-gradient(90deg, var(--ink) 50%, transparent 50%); }
  .etiqueta {
    display: inline-block; font-size: 12px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 99px; padding: 1px 9px; background: var(--soft);
    white-space: nowrap;
  }
  .etiqueta.forte { color: var(--ink); font-weight: 600; }
  details { border-top: 1px solid var(--border); }
  details:first-of-type { border-top: 0; }
  summary {
    list-style: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
    padding: 9px 2px; font-size: 14px;
  }
  summary::-webkit-details-marker { display: none; }
  summary .seta { margin-left: auto; color: var(--muted); transition: transform .15s; flex: none; }
  details[open] summary .seta { transform: rotate(90deg); }
  summary:hover { background: var(--soft); border-radius: var(--r-sm); }
  .detalhe { padding: 2px 2px 12px 22px; font-size: 13.5px; color: var(--muted); }
  .detalhe ul { padding-left: 16px; }
  .detalhe li + li { margin-top: 2px; }
  .caminho { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); word-break: break-all; }

  /* ---------- artefatos / filtros ---------- */
  .filtros { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .filtros button {
    font: 600 12px/1 system-ui, sans-serif; color: var(--muted); background: var(--soft);
    border: 1px solid var(--border); border-radius: 99px; padding: 5px 11px; cursor: pointer;
  }
  .filtros button[aria-pressed="true"] { color: var(--hero-ink); background: var(--hero-bg); border-color: transparent; }
  .lista-arte { max-height: 250px; overflow-y: auto; }
  .arte-item { display: flex; align-items: center; gap: 8px; padding: 6px 2px; border-top: 1px solid var(--border); font-size: 13.5px; }
  .arte-item:first-child { border-top: 0; }
  .arte-item .nome { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- atividade ---------- */
  .ativ-item { display: flex; gap: 10px; padding: 7px 2px; border-top: 1px solid var(--border); font-size: 13.5px; }
  .ativ-item:first-child { border-top: 0; }
  .ativ-item time { font-variant-numeric: tabular-nums; color: var(--muted); flex: none; font-size: 12.5px; padding-top: 1px; }

  /* ---------- craft ---------- */
  .selo {
    display: inline-block; font-size: 12px; font-weight: 600; letter-spacing: 0.02em;
    border: 1.5px dashed var(--muted); border-radius: 99px; padding: 3px 12px; color: var(--muted);
    margin-left: 8px; vertical-align: 1px;
  }
  .craft-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; margin-top: 6px; }
  .craft-grid h3 { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .paleta { display: flex; flex-wrap: wrap; gap: 8px; }
  .swatch { width: 108px; }
  .swatch .cor { height: 52px; border-radius: var(--r-sm); border: 1px solid var(--border); }
  .swatch .meta { font-size: 11.5px; margin-top: 4px; line-height: 1.35; }
  .swatch .meta b { display: block; font-weight: 600; }
  .swatch .meta span { color: var(--muted); font-family: ui-monospace, monospace; }
  .tok { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
  .tok .cor { width: 18px; height: 18px; border-radius: 5px; border: 1px solid var(--border); flex: none; }
  .tok code { font-size: 12px; }
  .tok .regra { color: var(--muted); font-size: 12px; margin-left: auto; text-align: right; }
  .specimen { padding: 4px 0 10px; border-bottom: 1px dashed var(--border); }
  .specimen:last-child { border-bottom: 0; }
  .specimen .papel { font-size: 11.5px; color: var(--muted); }
  .radii { display: flex; align-items: flex-end; gap: 12px; }
  .radii .quad { width: 54px; height: 54px; background: var(--soft); border: 1.5px solid var(--muted); }
  .radii .rot { font-size: 11.5px; color: var(--muted); text-align: center; margin-top: 4px; font-variant-numeric: tabular-nums; }
  .pills { display: flex; flex-wrap: wrap; gap: 6px; }

  footer { margin-top: 16px; font-size: 12.5px; color: var(--muted); text-align: center; }
  .erro { background: var(--card); border: 1.5px dashed var(--muted); border-radius: var(--r); padding: 22px; text-align: center; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="erro">Não encontrei <code>painel/dados.js</code> (window.PAINEL). Confira se o arquivo existe ao lado deste HTML.</div>
</div>

<script src="dados.js"></script>
<script>
(function () {
  const d = window.PAINEL;
  if (!d) return;
  const app = document.getElementById("app");
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  const dataBR = (iso) => { const [a, m, dia] = String(iso).split("-"); return dia && m && a ? `${dia}/${m}/${a}` : esc(iso); };

  const STATUS_FASE = {
    "nao-iniciada": { rot: "não iniciada", cls: "" },
    "em-andamento": { rot: "em andamento", cls: "meio" },
    "concluida":    { rot: "concluída",    cls: "cheio" },
  };
  const ordemUrgencia = { alta: 0, media: 1, baixa: 2 };
  const rotUrgencia = { alta: "alta", media: "média", baixa: "baixa" };

  const roadmap = d.roadmap.map((f) => {
    const st = STATUS_FASE[f.status] || STATUS_FASE["nao-iniciada"];
    return `<details>
      <summary>
        <span class="ponto ${st.cls}"></span>
        <strong>Fase ${esc(f.fase)} — ${esc(f.nome)}</strong>
        ${f.rfs && f.rfs !== "—" ? `<span class="etiqueta">${esc(f.rfs)}</span>` : ""}
        <span class="etiqueta ${f.status === "em-andamento" ? "forte" : ""}">${st.rot}</span>
        <span class="seta">›</span>
      </summary>
      <div class="detalhe">
        ${f.nota ? `<p style="margin-bottom:6px">${esc(f.nota)}</p>` : ""}
        <ul>${f.falta.map((i) => `<li>${esc(i)}</li>`).join("")}</ul>
      </div>
    </details>`;
  }).join("");

  const pendentes = [...d.decisoes.pendentes]
    .sort((a, b) => (ordemUrgencia[a.urgencia] ?? 9) - (ordemUrgencia[b.urgencia] ?? 9))
    .map((p) => `<details>
      <summary>
        <span class="etiqueta ${p.urgencia === "alta" ? "forte" : ""}">${rotUrgencia[p.urgencia] || esc(p.urgencia)}</span>
        <span style="flex:1">${esc(p.titulo)}</span>
        <span class="seta">›</span>
      </summary>
      <div class="detalhe">${esc(p.contexto)} <em>(com ${esc(p.quem)})</em></div>
    </details>`).join("");

  const tomadas = d.decisoes.tomadas.map((t) => `<details>
      <summary><span class="ponto cheio"></span><span style="flex:1">${esc(t.titulo)}</span><span class="seta">›</span></summary>
      <div class="detalhe">${esc(t.resumo)}<br><span class="caminho">${esc(t.onde)}</span></div>
    </details>`).join("");

  const areas = [...new Set(d.artefatos.map((a) => a.area))];
  const arteItem = (a) => `<div class="arte-item" data-area="${esc(a.area)}" title="${esc(a.caminho)}">
      <span class="nome">${esc(a.nome)}</span>
      <span class="etiqueta">${esc(a.status)}</span>
    </div>`;

  const atividade = d.atividade.map((a) => `<div class="ativ-item">
      <time datetime="${esc(a.data)}">${dataBR(a.data)}</time><span>${esc(a.resumo)}</span>
    </div>`).join("");

  const c = d.craft;
  const craft = `
    <div class="craft-grid">
      <div>
        <h3>Paleta proposta</h3>
        <div class="paleta">${c.paleta.map((p) => `
          <div class="swatch" title="${esc(p.papel)}">
            <div class="cor" style="background:${esc(p.hex)}"></div>
            <div class="meta"><b>${esc(p.nome)}</b><span>${esc(p.hex)}</span></div>
          </div>`).join("")}
        </div>
      </div>
      <div>
        <h3>Tokens de status / SLA</h3>
        ${c.statusTokens.map((t) => `
          <div class="tok"><span class="cor" style="background:${esc(t.hex)}"></span>
            <code>${esc(t.token)}</code><span class="regra">${esc(t.regra)}</span>
          </div>`).join("")}
        <h3 style="margin-top:14px">Componentes de domínio (a construir)</h3>
        <div class="pills">${c.componentesDominio.map((n) => `<span class="etiqueta">${esc(n)}</span>`).join("")}</div>
      </div>
      <div>
        <h3>Tipografia proposta</h3>
        ${c.tipografia.map((t) => `
          <div class="specimen">
            <div class="papel">${esc(t.papel)} — ${esc(t.familia)}</div>
            <div style="font-family:${esc(t.stack)}; font-size:${t.papel === "Display" ? "22px" : "15px"}; font-weight:${t.papel === "Display" ? 700 : 400}">${esc(t.exemplo)}</div>
          </div>`).join("")}
        <h3 style="margin-top:14px">Radius</h3>
        <div class="radii">${c.radius.map((r) => `
          <div><div class="quad" style="border-radius:${r.px}px"></div><div class="rot">${esc(r.nome)} · ${r.px}px</div></div>`).join("")}
        </div>
      </div>
    </div>`;

  app.innerHTML = `
    <header>
      <h1>Painel de Controle</h1>
      <span class="sub">SESI · Processo Seletivo — cockpit do projeto</span>
      <span class="carimbo" title="Atualizado pelo agente ao fim de cada loop (painel/dados.js)">atualizado em ${dataBR(d.atualizadoEm)}</span>
    </header>

    <section class="retomada" aria-label="Retomada de sessão">
      <div class="cartao"><h2>Onde parei</h2><p>${esc(d.retomada.ondeParei)}</p></div>
      <div class="cartao"><h2>O que mudou no último loop</h2><ul>${d.retomada.oQueMudou.map((i) => `<li>${esc(i)}</li>`).join("")}</ul></div>
      <div class="cartao hero"><h2>Próximo passo</h2><p>${esc(d.retomada.proximoPasso)}</p></div>
    </section>

    <div class="grade">
      <section class="modulo m-road" aria-label="Roadmap">
        <h2>Roadmap — fases 0–4 <span class="etiqueta" title="Faseamento aprovado (decisão B4) — STRATEGY.md">STRATEGY.md</span></h2>
        ${roadmap}
      </section>

      <section class="modulo m-dec" aria-label="Decisões">
        <h2>Decisões pendentes (${d.decisoes.pendentes.length})</h2>
        ${pendentes}
        <h2 style="margin-top:16px">Tomadas (${d.decisoes.tomadas.length})</h2>
        ${tomadas}
      </section>

      <section class="modulo m-arte" aria-label="Artefatos">
        <h2>Artefatos (${d.artefatos.length})</h2>
        <div class="filtros" role="group" aria-label="Filtrar por área">
          <button aria-pressed="true" data-f="">todos</button>
          ${areas.map((a) => `<button aria-pressed="false" data-f="${esc(a)}">${esc(a)}</button>`).join("")}
        </div>
        <div class="lista-arte">${d.artefatos.map(arteItem).join("")}</div>
      </section>

      <section class="modulo m-ativ" aria-label="Atividade">
        <h2>Atividade do agente</h2>
        ${atividade}
      </section>

      <section class="modulo m-craft" aria-label="Craft">
        <h2 style="display:inline-block">Craft — direção visual <span class="selo" title="Fonte: ${esc(c.fonte)}">${esc(c.validacao)}</span></h2>
        ${craft}
      </section>
    </div>

    <footer>Só leitura — quem escreve o estado é o agente, em <code>painel/dados.js</code>, ao fim de cada loop.</footer>`;

  // filtro de artefatos (única interação com estado, efêmera e de leitura)
  const botoes = app.querySelectorAll(".filtros button");
  const itens = app.querySelectorAll(".arte-item");
  botoes.forEach((b) => b.addEventListener("click", () => {
    botoes.forEach((x) => x.setAttribute("aria-pressed", String(x === b)));
    const f = b.dataset.f;
    itens.forEach((i) => { i.style.display = !f || i.dataset.area === f ? "" : "none"; });
  }));
})();
</script>
</body>
</html>
